swagger: '2.0'
info:
  title: Forex TWI API
  version: 1.0.0
  description: Public API for forex trade weighted index (TWI) data. Data sourced
    from Frankfurter API and processed with dbt in BigQuery.
schemes:
  - https
basePath: /
produces:
  - application/json
paths:
  /health:
    get:
      operationId: health_health_get
      summary: Health
      description: ''
      responses:
        '200':
          description: Successful Response
          schema:
            type: object
            additionalProperties:
              type: string
      x-google-backend:
        address: ${backend_url}
  /twi/latest:
    get:
      operationId: twi_latest_twi_latest_get
      summary: Twi Latest
      description: ''
      parameters:
        - name: base_iso
          in: query
          required: false
          type: string
          default: EUR
      responses:
        '200':
          description: Successful Response
          schema:
            type: object
            additionalProperties: true
        '422':
          description: Validation Error
          schema:
            $ref: '#/definitions/HTTPValidationError'
      x-google-backend:
        address: ${backend_url}
  /twi:
    get:
      operationId: twi_twi_get
      summary: Twi
      description: ''
      parameters:
        - name: base_iso
          in: query
          required: false
          type: string
          default: EUR
        - name: date
          in: query
          required: false
          type: string
          x-nullable: true
        - name: start
          in: query
          required: false
          type: string
          x-nullable: true
        - name: end
          in: query
          required: false
          type: string
          x-nullable: true
        - name: limit
          in: query
          required: false
          type: integer
          default: 100
          minimum: 1
          maximum: 1000
      responses:
        '200':
          description: Successful Response
          schema:
            type: array
            items:
              type: object
              additionalProperties: true
        '422':
          description: Validation Error
          schema:
            $ref: '#/definitions/HTTPValidationError'
definitions:
  HTTPValidationError:
    type: object
    title: HTTPValidationError
    properties:
      detail:
        type: array
        items:
          $ref: '#/definitions/ValidationError'
        title: Detail
  ValidationError:
    type: object
    title: ValidationError
    required:
      - loc
      - msg
      - type
    properties:
      loc:
        type: array
        items:
          type: string
        title: Location
      msg:
        type: string
        title: Message
      type:
        type: string
        title: Error Type
securityDefinitions:
  api_key:
    type: apiKey
    name: key
    in: query
security:
  - api_key: []
